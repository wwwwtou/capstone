version: '3.8'

services:
  # 1. Recommendation Engine (Go & Gin)
  rec-service:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_URL=postgres://admin:secret@db:5432/recsys
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-defense-secret-2026}
    depends_on:
      - db
      - redis
    networks:
      - recsys-net

  # 2. Administrative Dashboard (React)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api/v1
    networks:
      - recsys-net

  # 3. Persistence: PostgreSQL
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: recsys
    volumes:
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - recsys-net

  # 4. Cache Shard: Redis
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - recsys-net

networks:
  recsys-net:
    driver: bridge

volumes:
  pgdata:
