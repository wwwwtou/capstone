name: CI/CD - Lint, Test Report, Build and Deploy
run-name: CI/CD - Lint, Test Report, Build and Deploy - ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  unit-test-report:
    name: 1) Unit Tests - Report Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/6 - Checkout source
        uses: actions/checkout@v4

      - name: Step 2/6 - Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Step 3/6 - Run recommendation unit tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cd tiktok-glocal-ecommerce-recsys-mvp/services/recommendation
          go test -v ./... | tee ../../../artifacts/go-test.log

      - name: Step 4/6 - Build machine-readable test report
        shell: bash
        run: |
          set -euo pipefail
          total=$(grep -c "^=== RUN" artifacts/go-test.log || true)
          passed=$(grep -c "^--- PASS:" artifacts/go-test.log || true)
          failed=$(grep -c "^--- FAIL:" artifacts/go-test.log || true)
          if [ "$total" -eq 0 ]; then
            pass_rate="0.00"
          else
            pass_rate=$(awk "BEGIN { printf \"%.2f\", ($passed/$total)*100 }")
          fi

          {
            echo "# Unit Test Report"
            echo
            echo "- Scope: tiktok-glocal-ecommerce-recsys-mvp/services/recommendation"
            echo "- Total test cases: $total"
            echo "- Passed: $passed"
            echo "- Failed: $failed"
            echo "- Pass rate: ${pass_rate}%"
            echo
            echo "## Raw go test output"
            echo '```text'
            cat artifacts/go-test.log
            echo '```'
          } > artifacts/unit-test-report.md

      - name: Step 5/6 - Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            artifacts/unit-test-report.md
            artifacts/go-test.log

      - name: Step 6/6 - Fail on test failures
        shell: bash
        run: |
          if grep -q "^--- FAIL:" artifacts/go-test.log; then
            echo "Unit tests failed. See unit-test-report artifact."
            exit 1
          fi

  webservice-build:
    name: 2) Lint and Build Checks
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/5 - Checkout source
        uses: actions/checkout@v4

      - name: Step 2/5 - Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Step 3/5 - Install dependencies
        run: npm ci

      - name: Step 4/5 - Type check and web build
        run: |
          npm run lint
          npm run build

      - name: Step 5/5 - Docker build root webservice
        run: docker build -t e-commerce-video-recsys-mvp:ci .

  deploy-render:
    name: 3) Deploy to Render
    needs:
      - unit-test-report
      - webservice-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/2 - Trigger Render deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "DEPLOY_HOOK_URL secret is not configured. Skipping Render deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK_URL"

      - name: Step 2/2 - Deployment notice
        run: echo "Render deploy hook triggered successfully."
