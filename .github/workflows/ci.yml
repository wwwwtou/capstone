name: CI/CD - Lint, Test Report, Build and Deploy
run-name: CI/CD - Lint, Test Report, Build and Deploy - ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  go-quality-security:
    name: 1) Go Quality and Security
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/4 - Checkout source
        uses: actions/checkout@v4

      - name: Step 2/4 - Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Step 3/4 - Install analyzers
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Step 4/5 - Run vet (hard gate) on all Go modules
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t go_mods < <(find tiktok-glocal-ecommerce-recsys-mvp -type f -name 'go.mod' | sort)
          if [ ${#go_mods[@]} -eq 0 ]; then
            echo "No Go modules found under tiktok-glocal-ecommerce-recsys-mvp"
            exit 1
          fi

          for mod in "${go_mods[@]}"; do
            dir=$(dirname "$mod")
            echo "::group::Vet $dir"
            (
              cd "$dir"
              go vet ./...
            )
            echo "::endgroup::"
          done

      - name: Step 5/5 - Run advisory security scans and build report artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/security
          report="artifacts/security/go-security-summary.md"
          echo "# Go Security and Quality Report" > "$report"
          echo >> "$report"
          echo "- Mode: Advisory (report-only, non-blocking)" >> "$report"
          echo "- Scope: tiktok-glocal-ecommerce-recsys-mvp/**/go.mod" >> "$report"
          echo >> "$report"

          mapfile -t go_mods < <(find tiktok-glocal-ecommerce-recsys-mvp -type f -name 'go.mod' | sort)
          for mod in "${go_mods[@]}"; do
            dir=$(dirname "$mod")
            name=$(basename "$dir")

            echo "## Module: $dir" >> "$report"

            (
              cd "$dir"
              "$HOME/go/bin/golangci-lint" run ./... > "$GITHUB_WORKSPACE/artifacts/security/${name}-golangci-lint.txt" 2>&1 || true
              "$HOME/go/bin/gosec" ./... > "$GITHUB_WORKSPACE/artifacts/security/${name}-gosec.txt" 2>&1 || true
              "$HOME/go/bin/govulncheck" ./... > "$GITHUB_WORKSPACE/artifacts/security/${name}-govulncheck.txt" 2>&1 || true
            )

            echo "- golangci-lint: artifacts/security/${name}-golangci-lint.txt" >> "$report"
            echo "- gosec: artifacts/security/${name}-gosec.txt" >> "$report"
            echo "- govulncheck: artifacts/security/${name}-govulncheck.txt" >> "$report"
            echo >> "$report"
          done

      - name: Step 6/6 - Upload security report artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-security-report
          path: artifacts/security/

  frontend-security:
    name: 2) Frontend Dependency Security
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/3 - Checkout source
        uses: actions/checkout@v4

      - name: Step 2/3 - Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Step 3/3 - Audit npm dependencies
        run: |
          npm ci
          npm audit --audit-level=high

  unit-test-report:
    name: 3) Unit Tests - Report Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/6 - Checkout source
        uses: actions/checkout@v4

      - name: Step 2/6 - Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Step 3/6 - Run all microservice unit tests
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts
          : > artifacts/go-test.log
          mapfile -t go_mods < <(find tiktok-glocal-ecommerce-recsys-mvp/services -type f -name 'go.mod' | sort)
          if [ "${#go_mods[@]}" -eq 0 ]; then
            echo "No Go modules found under services/"
            exit 1
          fi
          for mod in "${go_mods[@]}"; do
            dir=$(dirname "$mod")
            name=$(basename "$dir")
            echo "===== module: $name ($dir) =====" | tee -a artifacts/go-test.log
            if ! ( cd "$dir" && go test -v ./... 2>&1 ) | tee -a artifacts/go-test.log; then
              echo "MODULE_FAILED: $name" | tee -a artifacts/go-test.log
            fi
          done

      - name: Step 4/6 - Build machine-readable test report
        shell: bash
        run: |
          set -euo pipefail
          total=$(grep -c '^=== RUN   Test' artifacts/go-test.log || true)
          passed=$(grep -c -- '--- PASS: Test' artifacts/go-test.log || true)
          failed=$(grep -c -- '--- FAIL: Test' artifacts/go-test.log || true)
          if [ "$total" -eq 0 ]; then
            pass_rate="0.00"
          else
            pass_rate=$(awk "BEGIN { printf \"%.2f\", ($passed/$total)*100 }")
          fi

          {
            echo "# Unit Test Report"
            echo
            echo "- Scope: tiktok-glocal-ecommerce-recsys-mvp/services/* (all Go microservices)"
            echo "- Total test cases: $total"
            echo "- Passed: $passed"
            echo "- Failed: $failed"
            echo "- Pass rate: ${pass_rate}%"
            echo "- 测试通过率统计口径：包含子测试"
            echo
            echo "## Raw go test output"
            echo '```text'
            cat artifacts/go-test.log
            echo '```'
          } > artifacts/unit-test-report.md

      - name: Step 5/6 - Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            artifacts/unit-test-report.md
            artifacts/go-test.log

      - name: Step 6/6 - Fail on test failures
        shell: bash
        run: |
          if grep -qE '^--- FAIL:|^MODULE_FAILED:' artifacts/go-test.log; then
            echo "Unit tests failed. See unit-test-report artifact."
            exit 1
          fi

  webservice-build:
    name: 4) Lint and Build Checks
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/5 - Checkout source
        uses: actions/checkout@v4

      - name: Step 2/5 - Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Step 3/5 - Install dependencies
        run: npm ci

      - name: Step 4/6 - Type check and web build
        run: |
          npm run lint
          npm run build

      - name: Step 5/6 - API smoke test (deployed mock artifact)
        run: node tests/smoke/server.smoke.mjs

      - name: Step 6/6 - Docker build root webservice
        run: docker build -t e-commerce-video-recsys-mvp:ci .

  microservice-integration:
    name: 5) Microservice Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/5 - Checkout source
        uses: actions/checkout@v4

      - name: Step 2/5 - Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Step 3/5 - Build and start the microservice stack
        run: |
          cd tiktok-glocal-ecommerce-recsys-mvp
          docker compose up -d --build

      - name: Step 4/5 - Wait for the full chain, then run integration + load tests
        run: |
          set -euo pipefail
          ready=0
          for i in $(seq 1 60); do
            if curl -fsS "http://localhost:8080/api/v1/recommendations?user_id=user_123" >/dev/null 2>&1; then
              ready=1; break
            fi
            sleep 3
          done
          if [ "$ready" -ne 1 ]; then
            echo "Stack did not become ready in time"
            cd tiktok-glocal-ecommerce-recsys-mvp && docker compose logs
            exit 1
          fi
          BASE=http://localhost:8080 node tests/integration/gateway.integration.mjs
          BASE=http://localhost:8080 TOTAL=300 CONCURRENCY=20 node tests/stress/recommend.load.mjs

      - name: Step 5/5 - Tear down
        if: always()
        run: cd tiktok-glocal-ecommerce-recsys-mvp && docker compose down -v

  e2e-tests:
    name: 6) End-to-End Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/5 - Checkout source
        uses: actions/checkout@v4

      - name: Step 2/5 - Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Step 3/5 - Install dependencies
        run: npm ci

      - name: Step 4/5 - Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Step 5/5 - Run E2E tests (drives the React UI in mock mode)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy-render:
    name: 7) Deploy to Render
    needs:
      - go-quality-security
      - frontend-security
      - unit-test-report
      - webservice-build
      - microservice-integration
      - e2e-tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Step 1/2 - Trigger Render deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "DEPLOY_HOOK_URL secret is not configured. Skipping Render deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK_URL"

      - name: Step 2/2 - Deployment notice
        run: echo "Render deploy hook triggered successfully."
